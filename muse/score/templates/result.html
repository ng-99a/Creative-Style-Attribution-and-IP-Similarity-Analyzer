<!DOCTYPE html>
<html>
<head>
    <title>Comparison Results</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            max-width: 900px; 
            margin: auto; 
            padding: 20px; 
            background-color: #f4f4f4; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1); 
        }
        .image-box { 
            display: flex; 
            justify-content: space-around; 
            margin-top: 20px; 
        }
        .image-container { 
            text-align: center; 
            width: 45%; 
        }
        .display-img { 
            width: 100%; 
            border-radius: 5px; 
            border: 1px solid #ddd; 
        }
        .result-text { 
            font-size: 24px; 
            color: #2c3e50; 
            text-align: center; 
            margin: 20px 0; 
            padding: 15px;
            background: #eef;
            border-radius: 5px;
        }
        button { 
            padding: 10px 20px; 
            background-color: #3498db; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 16px;
        }
        button:hover { background-color: #2980b9; }
    </style>
</head>
<body>

<div class="container">
    <h1>MUSE Style Similarity Results</h1>
    <hr>

    <div class="result-text">
        Style Similarity Score: <strong>{{ similarity }}%</strong>
    </div>

    <div class="image-box">
        <div class="image-container">
            <p><strong>Target Image</strong></p>
            <img src="{{ task.image1.url }}" class="display-img">
        </div>
        <div class="image-container">
            <p><strong>Reference Image</strong></p>
            <img src="{{ task.image2.url }}" class="display-img">
        </div>
    </div>

    <br><br>
    <div style="text-align: center;">
        <a href="{% url 'score' %}"><button type="button">Compare New Images</button></a>
    </div>
</div>

</body>
</html>

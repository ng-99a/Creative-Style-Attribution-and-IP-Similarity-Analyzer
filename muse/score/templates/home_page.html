<!DOCTYPE html>
<html>
<head>
    <title>Art Similarity App</title>
    <style>
        /* Simple styling to make the app look clean */
        body { 
            font-family: Arial, sans-serif; 
            max-width: 900px; 
            margin: auto; 
            padding: 20px; 
            background-color: #f4f4f4; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1); 
        }
        .image-box { 
            display: flex; 
            justify-content: space-around; 
            margin-top: 20px; 
        }
        .image-container { 
            text-align: center; 
            width: 45%; 
        }
        .display-img { 
            width: 100%; 
            border-radius: 5px; 
            border: 1px solid #ddd; 
        }
        .result-text { 
            font-size: 24px; 
            color: #2c3e50; 
            text-align: center; 
            margin: 20px 0; 
            padding: 10px;
            background: #eef;
            border-radius: 5px;
        }
        .error-message { 
            color: red; 
            background: #ffdada; 
            padding: 10px; 
            border-radius: 5px; 
        }
        button { 
            padding: 10px 20px; 
            background-color: #3498db; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
        }
        button:hover { background-color: #2980b9; }
    </style>
</head>
<body>

<div class="container">
    <h1>MUSE Art Similarity Checker</h1>
    <p>Upload two images to see how similar their artistic styles are.</p>

    {% if error %}
        <div class="error-message">
            <strong>Oops!</strong> {{ error }}
        </div>
    {% endif %}

    <hr>

<form action="{% url 'compare_image' %}" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="image-box">
            <div class="image-container">
                <h3>Image 1</h3>
                <input type="file" name="image1" required>
            </div>
            <div class="image-container">
                <h3>Image 2</h3>
                <input type="file" name="image2" required>
            </div>
        </div>

        <br><br>
        <div style="text-align: center;">
            <button type="submit">Compare Artistic Styles</button>
        </div>
    </form>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Art Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f9f9f9;
        }
        h1 {
            margin-top: 40px;
        }
        .options {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 60px;
        }
        .option {
            background: #4CAF50;
            color: white;
            padding: 20px 40px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.3s ease;
        }
        .option:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <h1>Welcome to the Art Portal</h1>
    <p>Select an option below to explore:</p>

    <div class="options">
        <!-- Button 1 -->
        <a href="/score/" class="option">Check if Your Art is Real</a>

        <!-- Button 2 -->
        <a href="#" class="option">Explore Multiple Arts</a>
    </div>
</body>
</html>
